name: Run Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Run migrations on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/tg-workout

            echo "--- Running user-service migrations ---"
            docker compose -f docker-compose.prod.yml exec -T user-service \
              npx typeorm migration:run -d dist/apps/user-service/data-source.js

            echo "--- Running workout-service migrations ---"
            docker compose -f docker-compose.prod.yml exec -T workout-service \
              npx typeorm migration:run -d dist/apps/workout-service/data-source.js
