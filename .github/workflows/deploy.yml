name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/tg-workout/

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/tg-workout
            echo "--- Stopping app services ---"
            docker compose -f docker-compose.prod.yml stop gateway user-service workout-service ai-service sync-service parsing-service bot-service
            docker compose -f docker-compose.prod.yml rm -f gateway user-service workout-service ai-service sync-service parsing-service bot-service
            docker image prune -f

            echo "--- Pulling new images ---"
            for svc in gateway user-service workout-service ai-service sync-service parsing-service bot-service; do
              echo "Pulling $svc..."
              docker compose -f docker-compose.prod.yml pull $svc
              docker image prune -f
            done

            echo "--- Starting all services ---"
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
