name: Build & Push Images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/frontend/**'
      - '*.md'
      - 'theory/**'
      - '.claude/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/grpugaguga/tg-workout

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - gateway
          - user-service
          - workout-service
          - ai-service
          - sync-service
          - parsing-service
          - bot-service
      max-parallel: 1

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: APP_NAME=${{ matrix.service }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
