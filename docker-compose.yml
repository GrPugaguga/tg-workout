services:
  postgres-user:
    image: postgres:16
    container_name: postgres-user
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/user/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - backend_network

  postgres-workout:
    image: postgres:16
    container_name: postgres-workout
    environment:
      POSTGRES_USER: ${WORKOUT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${WORKOUT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${WORKOUT_POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/workout/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - backend_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - backend_network


networks:
  backend_network:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
